# =============================================================================
# service.yaml — internal Service fronting online-shop pods
# =============================================================================
#
# ClusterIP only — external traffic enters through the shared internal ALB
# provisioned by the per-app Ingress, routed to this Service.
# Service port 80 → pod port 8080.

apiVersion: v1
kind: Service
metadata:
  name: online-shop
  namespace: online-shop
  labels:
    app: online-shop
spec:
  type: ClusterIP
  selector:
    app: online-shop
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
