# =============================================================================
# applicationset.yaml — ArgoCD ApplicationSet for tgt-eks-01 cluster
# =============================================================================
#
# Generates ONE ArgoCD Application per subdirectory of manifests/dev/*.
# Drop a new folder under manifests/dev/<app-name>/ (containing the standard
# base/ + overlays/dev/ Kustomize layout) and ArgoCD discovers it on its
# next git poll (~30s with our config). No edits to this file when adding
# apps — the directory generator handles enumeration.
#
# Each generated Application:
#   - reads from manifests/dev/<app>/overlays/dev (Kustomize-built)
#   - syncs to namespace <app>
#   - prune + selfHeal automated
#
# This ApplicationSet is loaded into the cluster by the root 'bootstrap'
# Application that Terraform creates ONCE in argocd.tf (the app-of-apps
# pattern). After that bootstrap, ArgoCD owns the entire chain.
#
# CRITICAL FIELD-NAME GOTCHA (carry-over from GCP project):
#   - The GENERATOR's git block uses `revision:` (per the AppSet schema)
#   - The TEMPLATE's spec.source block uses `targetRevision:` (per Application schema)
#   They are two different fields with the same purpose. Mixing them produces
#   "strict decoding error: unknown field" on apply.
#
# IMAGE-UPDATER ANNOTATIONS (template.metadata.annotations):
#   Every Application generated by this AppSet gets the same set of
#   argocd-image-updater.argoproj.io/* annotations. They tell Image Updater:
#     - WHICH image to track (image-list)
#     - HOW to pick a new tag (update-strategy + allow-tags)
#     - HOW to apply the new tag (write-back-method + kustomize.image-name)
#
#   NOTE: In v1 of the cluster Image Updater is installed but NOT
#   configured to talk to ECR (no aws-cli in pod). Annotations below are
#   the contract for when ECR auth gets wired in phase 2.5; until then,
#   image bumps in this repo are MANUAL:
#
#     cd manifests/dev/<app>/overlays/dev
#     kustomize edit set image <app>=<account>.dkr.ecr.us-east-1.amazonaws.com/tgt-images/<app>:<SHA>
#     git commit -am "bump <app> to <SHA>"
#     git push

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tgt-eks-01-apps
  namespace: argocd
  labels:
    managed-by: gitops-bootstrap
    cluster: tgt-eks-01
spec:
  generators:
    - git:
        # Must EXACTLY match the credential URL in argocd.tf so ArgoCD's
        # configured GitHub credentials apply.
        repoURL: https://github.com/dkeeno/tgt-manifests.git
        revision: HEAD
        directories:
          - path: manifests/dev/*
  template:
    metadata:
      name: '{{path.basename}}'
      labels:
        managed-by: argocd
        app: '{{path.basename}}'
      annotations:
        # ---- Image Updater wiring ----
        # Single ECR repo `tgt-images` (HARD RULE feedback_single_ecr_repo).
        # Per-app discrimination is in the tag prefix.
        #
        # DIGEST STRATEGY (chosen 2026-05-14):
        # IU watches a SPECIFIC tag (`<app>-latest`) and pins its DIGEST in
        # the manifest. When CI re-tags `<app>-latest` to a new image, the
        # digest changes; IU updates the pinned digest. Result:
        # - Immune to lex-sort vs push-time-sort issues (no SHA-tag sort)
        # - Manifest pins to the exact image deployed (digest is verifiable)
        # - Works for any tag naming convention
        #
        # Tradeoff: manifest references `<app>-latest@sha256:...` instead of
        # the bare SHA tag. To trace the deployed digest back to a source SHA,
        # query ECR: `aws ecr describe-images --image-ids imageDigest=sha256:...`
        # — the SHA tag is still pushed by CI alongside `<app>-latest`.
        argocd-image-updater.argoproj.io/image-list: 'app=784916389752.dkr.ecr.us-east-1.amazonaws.com/tgt-images:{{path.basename}}-latest'
        argocd-image-updater.argoproj.io/app.update-strategy: digest
        # allow-tags is unused with digest strategy — IU watches the explicit
        # tag from image-list, not a regex-filtered set.
        # Kustomize bridge: tells IU which `images:` entry in the overlay's
        # kustomization.yaml to target. Matches the `name:` field there,
        # which is the bare app name.
        argocd-image-updater.argoproj.io/app.kustomize.image-name: '{{path.basename}}'
        # Write-back-method: git (NOT argocd). IU commits the new tag to
        # this gitops repo. ArgoCD's auto-sync fires on the new git revision.
        # Same lesson as GCP project (argocd-write-back patches don't trigger
        # auto-sync because auto-sync is git-rev-based).
        argocd-image-updater.argoproj.io/write-back-method: git
        # Push directly to main (single committer, sequential writes, no race).
        argocd-image-updater.argoproj.io/git-branch: main
    spec:
      project: default
      source:
        repoURL: https://github.com/dkeeno/tgt-manifests.git
        targetRevision: HEAD
        # Point at the dev overlay — that's where the Kustomization that
        # composes base/ + dev overrides lives. ArgoCD auto-detects
        # Kustomize via the kustomization.yaml at this path.
        path: '{{path}}/overlays/dev'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          # Auto-create the target namespace (also asserted by namespace.yaml
          # in the per-app folder, but this option ensures Application sync
          # doesn't fail on the very first apply).
          - CreateNamespace=true
          # Server-side apply avoids merge conflicts on resources with
          # large/list-typed fields managed by other controllers.
          - ServerSideApply=true
